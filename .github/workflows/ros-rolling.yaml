name: ROS2 Rolling

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Rolling is allowed to fail: ros-rolling-point-cloud-interfaces was dropped
    # from the apt sync circa 2026-04-25 (last green Rolling on main: 2026-04-20).
    # Remove this once upstream restores the package or we migrate off it.
    continue-on-error: true
    container:
      image: rostooling/setup-ros-docker:ubuntu-noble-ros-rolling-ros-base-latest
    steps:
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: rolling

      # Rolling is a rolling release - the Docker base image can have a stale set of
      # packages. Upgrading only a subset (e.g. rclcpp) breaks rcl/rmw ABI. Upgrade
      # ALL installed ros-rolling-* packages atomically to restore consistency.
      - name: Upgrade all ROS Rolling packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --only-upgrade $(dpkg -l 'ros-rolling-*' | awk '/^ii/{print $2}' | tr '\n' ' ')

      - uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: |
            cloudini_lib
            cloudini_ros
          target-ros2-distro: rolling
          colcon-defaults: |
            {
              "build": {
                "merge-install": true,
                "cmake-args": ["-DFETCHCONTENT_FULLY_DISCONNECTED=ON"]
              },
              "test": {"merge-install": true}
            }
