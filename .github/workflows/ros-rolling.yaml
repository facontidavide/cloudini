name: ROS2 Rolling

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rostooling/setup-ros-docker:ubuntu-noble-ros-rolling-ros-base-latest
    steps:
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: rolling

      # Rolling is a rolling release - the Docker base image can have older packages
      # than the newly installed ones (e.g. point_cloud_transport built vs installed rclcpp).
      # Upgrade core ROS packages to ensure ABI consistency.
      - name: Upgrade core ROS Rolling packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --only-upgrade \
            ros-rolling-rclcpp \
            ros-rolling-rclcpp-components \
            ros-rolling-ament-index-cpp

      - uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: |
            cloudini_lib
            cloudini_ros
          target-ros2-distro: rolling
          colcon-defaults: |
            {
              "build": {
                "merge-install": true,
                "cmake-args": ["-DFETCHCONTENT_FULLY_DISCONNECTED=ON"]
              },
              "test": {"merge-install": true}
            }
